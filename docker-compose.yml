version: "3"

services:
  #  our app
  fimsprotoms:
    image: fimsprotoms
    build:
      context: .
      dockerfile: ./docker/app/Dockerfile
    environment:
      - GIN_MODE=debug
      - PROFILE=dev-docker
    depends_on: 
      - db

  # postgresql database
  db:
    build:
      context: ./docker/postgres
      dockerfile: ./Dockerfile
    restart: always
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: test

  # test purpose tools:
  # database admin
  adminer:
    image: adminer:latest
    restart: always
    ports:
      - 8080:8080

networks:
  default:
    external: true
    name: fims-intranet