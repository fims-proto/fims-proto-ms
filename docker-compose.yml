  # postgresql database
  db:
    build:
      context: ./docker/postgres
      dockerfile: ./Dockerfile
    restart: on-failure
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: test
    ports:
      - "5432:5432"

  # test purpose tools:
  # database admin
  adminer:
    image: adminer:latest
    restart: on-failure
    ports:
      - "8080:8080"
