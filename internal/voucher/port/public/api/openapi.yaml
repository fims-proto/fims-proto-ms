openapi: 3.0.0
info:
  contact:
    email: xld704@gmail.com
    name: Lind Xiao
  description: HTTP port generated from openapi v3
  title: fims-proto vouchers
  version: 1.0.0
servers:
- url: https://{hostname}/vouchers
  variables:
    hostname:
      default: localhost
security:
- bearerAuth: []
paths:
  /:
    get:
      operationId: AllVouchers
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VouchersQry'
          description: todo
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: unexpected error
      tags:
      - Voucher
    post:
      operationId: Record
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordVoucherCmd'
        description: todo
        required: true
      responses:
        "200":
          description: todo
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: unexpected error
      tags:
      - Voucher
  /{voucherUUID}:
    get:
      operationId: VoucherForUUID
      parameters:
      - description: todo
        explode: false
        in: path
        name: voucherUUID
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoucherQry'
          description: todo
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: unexpected error
      tags:
      - Voucher
    patch:
      operationId: Update
      parameters:
      - explode: false
        in: path
        name: voucherUUID
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVoucherCmd'
        description: todo
        required: true
      responses:
        "200":
          description: todo
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: unexpected error
      tags:
      - Voucher
  /{voucherUUID}/audit:
    post:
      operationId: Audit
      parameters:
      - description: todo
        explode: false
        in: path
        name: voucherUUID
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditVoucherCmd'
        description: todo
        required: true
      responses:
        "200":
          description: todo
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: unexpected error
      tags:
      - Voucher
  /{voucherUUID}/review:
    post:
      operationId: Review
      parameters:
      - description: todo
        explode: false
        in: path
        name: voucherUUID
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewVoucherCmd'
        description: todo
        required: true
      responses:
        "204":
          description: todo
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: unexpected error
      tags:
      - Voucher
components:
  schemas:
    Training:
      properties:
        uuid:
          format: uuid
          type: string
        user:
          example: Mariusz Pudzianowski
          type: string
        userUuid:
          format: uuid
          type: string
        notes:
          example: let's do leg day!
          type: string
        time:
          format: date-time
          type: string
        canBeCancelled:
          type: boolean
        moveRequiresAccept:
          type: boolean
        proposedTime:
          format: date-time
          type: string
        moveProposedBy:
          type: string
      required:
      - canBeCancelled
      - moveRequiresAccept
      - notes
      - time
      - user
      - userUuid
      - uuid
      type: object
    Trainings:
      properties:
        trainings:
          items:
            $ref: '#/components/schemas/Training'
          type: array
      required:
      - trainings
      type: object
    PostTraining:
      properties:
        notes:
          example: let's do leg day!
          type: string
        time:
          format: date-time
          type: string
      required:
      - notes
      - time
      type: object
    Error:
      properties:
        slug:
          type: string
        message:
          type: string
      required:
      - message
      - slug
      type: object
    AuditVoucherCmd:
      example:
        AuditorUUID: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        VoucherUUID: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
      properties:
        VoucherUUID:
          format: uuid
          type: string
        AuditorUUID:
          format: uuid
          type: string
      type: object
    RecordVoucherCmd:
      example:
        Debit: Debit
        LineItems:
        - Debit: Debit
          Credit: Credit
          Summary: Summary
          AccountNumber: AccountNumber
        - Debit: Debit
          Credit: Credit
          Summary: Summary
          AccountNumber: AccountNumber
        Credit: Credit
        Number: 0
        CreatedAt: 2000-01-23T04:56:07.000+00:00
        CreatorUUID: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        UUID: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
      properties:
        UUID:
          format: uuid
          type: string
        Number:
          minimum: 0
          type: integer
        CreatedAt:
          format: date-time
          type: string
        LineItems:
          items:
            $ref: '#/components/schemas/LineItemCmd'
          type: array
        Debit:
          type: string
        Credit:
          type: string
        CreatorUUID:
          format: uuid
          type: string
      required:
      - time
      type: object
    LineItemCmd:
      example:
        Debit: Debit
        Credit: Credit
        Summary: Summary
        AccountNumber: AccountNumber
      properties:
        Summary:
          type: string
        AccountNumber:
          type: string
        Debit:
          type: string
        Credit:
          type: string
      type: object
    ReviewVoucherCmd:
      example:
        ReviewerUUID: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        VoucherUUID: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
      properties:
        VoucherUUID:
          format: uuid
          type: string
        ReviewerUUID:
          format: uuid
          type: string
      type: object
    UpdateVoucherCmd:
      example:
        LineItems:
        - Debit: Debit
          Credit: Credit
          Summary: Summary
          AccountNumber: AccountNumber
        - Debit: Debit
          Credit: Credit
          Summary: Summary
          AccountNumber: AccountNumber
        VoucherUUID: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
      properties:
        VoucherUUID:
          format: uuid
          type: string
        LineItems:
          items:
            $ref: '#/components/schemas/LineItemCmd'
          type: array
      type: object
    LineItemQry:
      example:
        Debit: Debit
        Credit: Credit
        Summary: Summary
        AccountNumber: AccountNumber
      properties:
        Summary:
          type: string
        AccountNumber:
          type: string
        Debit:
          type: string
        Credit:
          type: string
      type: object
    VoucherQry:
      example:
        Debit: Debit
        ReviewerUUID: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        LineItems:
        - Debit: Debit
          Credit: Credit
          Summary: Summary
          AccountNumber: AccountNumber
        - Debit: Debit
          Credit: Credit
          Summary: Summary
          AccountNumber: AccountNumber
        Credit: Credit
        Number: 0
        CreatedAt: 2000-01-23T04:56:07.000+00:00
        IsReviewed: true
        IsAudited: true
        CreatorUUID: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        UUID: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        AuditorUUID: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        AttachmentQuantity: 0
      properties:
        UUID:
          format: uuid
          type: string
        Number:
          minimum: 0
          type: integer
        CreatedAt:
          format: date-time
          type: string
        AttachmentQuantity:
          minimum: 0
          type: integer
        LineItems:
          items:
            $ref: '#/components/schemas/LineItemQry'
          type: array
        Debit:
          type: string
        Credit:
          type: string
        CreatorUUID:
          format: uuid
          type: string
        ReviewerUUID:
          format: uuid
          type: string
        IsReviewed:
          type: boolean
        AuditorUUID:
          format: uuid
          type: string
        IsAudited:
          type: boolean
      required:
      - time
      type: object
    VouchersQry:
      items:
        $ref: '#/components/schemas/VoucherQry'
      type: array
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http
