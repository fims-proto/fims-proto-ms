version: v0.7.6-alpha.1

identity:
  default_schema_url: file:///etc/config/kratos/identity.schema.json

dsn: memory

serve:
  public:
    base_url: http://127.0.0.1:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://127.0.0.1:4455
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
        - X-Session-Token
      exposed_headers:
        - Content-Type
        - Set-Cookie
      allow_credentials: true
      options_passthrough: true
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: http://127.0.0.1:4455
  whitelisted_return_urls:
    - http://127.0.0.1:4455

  methods:
    link:
      enabled: true
    password:
      enabled: true
    profile:
      enabled: true

  flows:
    recovery:
      enabled: true
    settings:
      ui_url: http://127.0.0.1:4455/user/settings
    logout:
      after:
        default_browser_return_url: http://127.0.0.1:4455/user/loggedOut

log:
  level: debug
  format: text
  leak_sensitive_values: true

secrets:
  cookie:
    - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE

hashers:
  argon2:
    parallelism: 1
    memory: 128MB
    iterations: 2
    salt_length: 16
    key_length: 16

courier:
  smtp:
    connection_uri: smtps://test:test@mailslurper:1025/?skip_ssl_verify=true
