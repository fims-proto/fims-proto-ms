  /sob/{sobId}/account/{accountId}:
    get:
      consumes:
      - application/json
      description: Get an account by id
      parameters:
      - description: Sob ID
        in: path
        name: sobId
        required: true
        type: string
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.AccountResponse'
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_general_ledger_port_public_http.Error'
      tags:
      - accounts
    patch:
      consumes:
      - application/json
      description: Update account
      parameters:
