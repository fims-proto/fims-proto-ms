paths:
  /sob/{sobId}/account-configurations/:
    get:
      consumes:
      - application/json
      description: List all account configurations
      parameters:
      - description: Sob ID
        in: path
        name: sobId
        required: true
        type: string
      - default: 1
        description: page number
        in: query
        name: $page
        type: integer
      - default: 40
        description: page size
        in: query
        name: $size
        type: integer
      - description: sort on field(s)
        example: updatedAt desc,createdAt
        in: query
        name: $sort
        type: string
      - description: choose only field(s)
        in: query
        name: $choose
        type: string
      - description: filter on field(s)
        example: title eq 'something' and amount lt 10
        in: query
        name: $filter
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/http.AccountConfigurationResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_account_port_public_http.Error'
      tags:
      - accounts
