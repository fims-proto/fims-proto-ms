      - default: 1
        description: page number
        in: query
        name: $page
        type: integer
      - default: 40
        description: page size
        in: query
        name: $size
        type: integer
      - description: sort on field(s)
        example: updatedAt desc,createdAt
        in: query
        name: $sort
        type: string
      - description: filter on field(s)
        example: title eq 'something' and amount lt 10
