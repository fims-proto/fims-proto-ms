openapi: "3.0.0"
info:
  version: 1.0.0
  title: fims-proto set of books
  description: HTTP port generated from openapi v3
  contact:
    name: Linfeng Ou
    email: linfeng.ou@gmail.com
servers:
  - url: https://{hostname}/sobs
    variables:
      hostname:
        default: localhost
security:
  - bearerAuth: []
paths:
  /:
    get:
      tags:
        - Set of books
      operationId: AllSobs
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SobsResponse'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Set of book
      operationId: Create
      requestBody:
        description: Create SoB payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSobRequest'
      responses:
        '201':
          description: created
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /{sob}:
    get:
      tags:
        - Set of book
      operationId: SobId
      parameters:
        - in: path
          name: sob
          schema:
            type: string
          required: true
          description: sob
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SobResponse'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required:
        - slug
        - message
      properties:
        slug:
          type: string
        message:
          type: string
    
    CreateSobRequest:
      type: object
      required: [Id, Name, Description]
      properties:
        Id:
          type: string
        Name:
          type: string
        Description:
          type: string
    
    SobResponse:
      type: object
      required: [Id, Name, Description]
      properties:
        Id:
          type: string
        Name:
          type: string
        Description:
          type: string
    
    SobsResponse:
      type: array
      items:
        $ref: '#/components/schemas/SobResponse'
    
