openapi: "3.0.0"
info:
  version: 1.0.0
  title: fims-proto vouchers
  description: HTTP port generated from openapi v3
  contact:
    name: Lind Xiao
    email: xld704@gmail.com
servers:
  - url: https://{hostname}/vouchers
    variables:
      hostname:
        default: localhost
security:
  - bearerAuth: []
paths:
  /{sob}/:
    get:
      tags:
        - Voucher
      operationId: AllVouchers
      parameters:
        - in: path
          name: sob
          schema:
            type: string
          required: true
          description: sob
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VouchersResponse'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Voucher
      operationId: Record
      parameters:
        - in: path
          name: sob
          schema:
            type: string
          required: true
          description: sob
      requestBody:
        description: Record voucher payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordVoucherRequest'
      responses:
        '201':
          description: created
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /{sob}/{voucherId}:
    get:
      tags:
        - Voucher
      operationId: VoucherByUUID
      parameters:
        - in: path
          name: sob
          schema:
            type: string
          required: true
          description: sob
        - in: path
          name: voucherId
          schema:
            type: string
            format: uuid
          required: true
          description: UUID of voucher
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoucherResponse'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags:
        - Voucher
      operationId: Update
      parameters:
        - in: path
          name: sob
          schema:
            type: string
          required: true
          description: sob
        - in: path
          name: voucherId
          schema:
            type: string
            format: uuid
          required: true
          description: UUID of voucher
      requestBody:
        description: Update voucher payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVoucherRequest'
      responses:
        '204':
          description: no content
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /{sob}/{voucherId}/audit:
    post:
      tags:
        - Voucher
      operationId: Audit
      requestBody:
        description: Audit voucher payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditVoucherRequest'
      parameters:
        - in: path
          name: sob
          schema:
            type: string
          required: true
          description: sob
        - in: path
          name: voucherId
          schema:
            type: string
            format: uuid
          required: true
          description: UUID of voucher
      responses:
        '204':
          description: no content
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /{sob}/{voucherId}/cancel-audit:
    post:
      tags:
        - Voucher
      operationId: CancelAudit
      requestBody:
        description: Cancel audit voucher payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditVoucherRequest'
      parameters:
        - in: path
          name: sob
          schema:
            type: string
          required: true
          description: sob
        - in: path
          name: voucherId
          schema:
            type: string
            format: uuid
          required: true
          description: UUID of voucher
      responses:
        '204':
          description: no content
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /{sob}/{voucherId}/review:
    post:
      tags:
        - Voucher
      operationId: Review
      requestBody:
        description: Review voucher payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewVoucherRequest'
      parameters:
        - in: path
          name: sob
          schema:
            type: string
          required: true
          description: sob
        - in: path
          name: voucherId
          schema:
            type: string
            format: uuid
          required: true
          description: UUID of voucher
      responses:
        '204':
          description: no content
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /{sob}/{voucherId}/cancel-review:
    post:
      tags:
        - Voucher
      operationId: CancelReview
      requestBody:
        description: Cancel review voucher payload
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewVoucherRequest'
      parameters:
        - in: path
          name: sob
          schema:
            type: string
          required: true
          description: sob
        - in: path
          name: voucherId
          schema:
            type: string
            format: uuid
          required: true
          description: UUID of voucher
      responses:
        '204':
          description: no content
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /{sob}/{voucherId}/post:
    post:
      tags:
        - Voucher
      operationId: Post
      parameters:
        - in: path
          name: sob
          schema:
            type: string
          required: true
          description: sob
        - in: path
          name: voucherId
          schema:
            type: string
            format: uuid
          required: true
          description: UUID of voucher
      responses:
        '204':
          description: no content
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required:
        - slug
        - message
      properties:
        slug:
          type: string
        message:
          type: string
    
    AuditVoucherRequest:
      type: object
      required: [Auditor]
      properties:
        Auditor:
          type: string
    
    RecordVoucherRequest:
      type: object
      required: [VoucherType, AttachmentQuantity, LineItems, Creator]
      properties:
        VoucherType:
          type: string
        AttachmentQuantity:
          type: integer
          minimum: 0
        LineItems:
          type: array
          items:
            $ref: '#/components/schemas/LineItemRequest'
        Creator:
          type: string

    LineItemRequest:
      type: object
      required: [Summary, AccountNumber, Debit, Credit]
      properties:
        Summary:
          type: string
        AccountNumber:
          type: string
        Debit:
          type: string
        Credit:
          type: string

    ReviewVoucherRequest:
      type: object
      required: [Reviewer]
      properties:
        Reviewer:
          type: string
    
    UpdateVoucherRequest:
      type: object
      required: [LineItems]
      properties:
        LineItems:
          type: array
          items:
            $ref: '#/components/schemas/LineItemRequest'

    LineItemResponse:
      type: object
      required: [Summary, AccountNumber, Debit, Credit]
      properties:
        Summary:
          type: string
        AccountNumber:
          type: string
        Debit:
          type: string
        Credit:
          type: string

    VoucherResponse:
      type: object
      required: [Sob, UUID, Type, Number, CreatedAt, AttachmentQuantity, LineItems, Debit, Credit, Creator, Reviewer, IsReviewed, Auditor, IsAudited, IsPosted]
      properties:
        Sob:
          type: string
        UUID:
          type: string
          format: uuid
        Type:
          type: string
        Number:
          type: string
        CreatedAt:
          type: string
          format: date-time
        AttachmentQuantity:
          type: integer
          minimum: 0
        LineItems:
          type: array
          items:
            $ref: '#/components/schemas/LineItemResponse'
        Debit:
          type: string
        Credit:
          type: string
        Creator:
          type: string
        Reviewer:
          type: string
        IsReviewed:
          type: boolean
        Auditor:
          type: string
        IsAudited:
          type: boolean
        IsPosted:
          type: boolean
    
    VouchersResponse:
      type: array
      items:
        $ref: '#/components/schemas/VoucherResponse'
    
