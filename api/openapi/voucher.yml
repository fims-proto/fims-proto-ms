openapi: "3.0.0"
info:
  version: 1.0.0
  title: fims-proto vouchers 
  description: HTTP port generated from openapi v3
  contact:
    name: Lind Xiao 
    email: xld704@gmail.com
servers:
  - url: https://{hostname}/vouchers
    variables:
      hostname:
        default: localhost
security:
  - bearerAuth: []
paths:
  /:
    get:
      tags:
        - Voucher
      operationId: AllVouchers
      responses:
        '200':
          description: todo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VouchersQry'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Voucher
      operationId: Record
      requestBody:
        description: todo
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordVoucherCmd'
      responses:
        '200':
          description: todo
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /{uuid}:
    get:
      tags:
        - Voucher
      operationId: VoucherByUUID
      parameters:
        - in: path
          name: uuid
          schema:
            type: string
            format: uuid
          required: true
          description: todo
      responses:
        '200':
          description: todo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoucherQry'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags:
        - Voucher
      operationId: Update
      parameters:
        - in: path
          name: uuid
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        description: todo
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVoucherCmd'
      responses:
        '200':
          description: todo
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /{uuid}/audit:
    post:
      tags:
        - Voucher
      operationId: Audit
      requestBody:
        description: todo
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditVoucherCmd'
      parameters:
        - in: path
          name: uuid
          schema:
            type: string
            format: uuid
          required: true
          description: todo
      responses:
        '200':
          description: todo
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /{uuid}/review:
    post:
      tags:
        - Voucher
      operationId: Review
      requestBody:
        description: todo
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewVoucherCmd'
      parameters:
        - in: path
          name: uuid 
          schema:
            type: string
            format: uuid
          required: true
          description: todo
      responses:
        '204':
          description: todo
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required:
        - slug
        - message
      properties:
        slug:
          type: string
        message:
          type: string
    
    AuditVoucherCmd:
      type: object
      required: [Auditor]
      properties:
        Auditor:
          type: string
    
    RecordVoucherCmd:
      type: object
      required: [Number, CreatedAt, AttachmentQuantity, LineItems, Creator]
      properties:
        Number: 
          type: string
        CreatedAt:
          type: string
          format: date-time
        AttachmentQuantity:
          type: integer
          minimum: 0
        LineItems:
          type: array
          items:
            $ref: '#/components/schemas/LineItemCmd'
        Creator:
          type: string

    LineItemCmd:
      type: object
      required: [Summary, AccountNumber, Debit, Credit]
      properties:
        Summary: 
          type: string
        AccountNumber:
          type: string
        Debit:
          type: string
        Credit:
          type: string

    ReviewVoucherCmd:
      type: object
      required: [Reviewer]
      properties:
        Reviewer:
          type: string
    
    UpdateVoucherCmd:
      type: object
      required: [LineItems]
      properties:
        LineItems:
          type: array
          items:
            $ref: '#/components/schemas/LineItemCmd'

    LineItemQry:
      type: object
      required: [Summary, AccountNumber, Debit, Credit]
      properties:
        Summary:
          type: string
        AccountNumber:
          type: string
        Debit:
          type: string
        Credit:
          type: string

    VoucherQry:
      type: object
      required: [UUID, Number, CreatedAt, AttachmentQuantity, LineItems, Debit, Credit, Creator, Reviewer, IsReviewed, Auditor, IsAudited]
      properties:
        UUID: 
          type: string
          format: uuid 
        Number:
          type: string
        CreatedAt:
          type: string
          format: date-time
        AttachmentQuantity:
          type: integer
          minimum: 0
        LineItems:
          type: array
          items:
            $ref: '#/components/schemas/LineItemQry'
        Debit:
          type: string
        Credit:
          type: string
        Creator:
          type: string
        Reviewer:
          type: string
        IsReviewed:
          type: boolean
        Auditor:
          type: string
        IsAudited:
          type: boolean
    
    VouchersQry:
      type: array
      items:
        $ref: '#/components/schemas/VoucherQry'
    
